name: Explore Aqeeda

on:
  workflow_dispatch:
    inputs:
      sample:
        description: 'عدد صفحات العينة'
        default: '15'

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python explore_aqeeda.py
        env:
          SAMPLE: ${{ github.event.inputs.sample }}

      - uses: actions/upload-artifact@v4
        with:
          name: explore-results
          path: |
            explore_report.txt
            explore_samples/
